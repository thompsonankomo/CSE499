<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Student Management System</h1>
    <div id="login-section">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button onclick="login()">Login</button>
    </div>
    <div id="student-section" style="display: none;">
        <h2>Manage Students</h2>
        <input type="text" id="student-name" placeholder="Student Name">
        <input type="email" id="student-email" placeholder="Student Email">
        <input type="text" id="student-course" placeholder="Student Course">
        <button onclick="addStudent()">Add Student</button>
        <ul id="student-list"></ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
